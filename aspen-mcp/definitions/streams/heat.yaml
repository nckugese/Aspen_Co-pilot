  aspen_path: \Data\Streams\{stream_name}\Input\DUTY
  type: float
  description: Heat duty
- name: temperature
  aspen_path: \Data\Streams\{stream_name}\Input\TEMP
  type: float
  description: Stream temperature
- name: end_temperature
