category: streams/material
stream_type: MATERIAL
description: Material stream properties
properties:
- name: temperature
  aspen_path: \Data\Streams\{stream_name}\Input\TEMP\MIXED
  type: float
  description: Stream temperature
- name: pressure
  aspen_path: \Data\Streams\{stream_name}\Input\PRES\MIXED
  type: float
  description: Stream pressure
- name: total_flow
  aspen_path: \Data\Streams\{stream_name}\Input\TOTFLOW\MIXED
  type: float
  description: Total mass/mole flow rate
- name: vapor_fraction
  aspen_path: \Data\Streams\{stream_name}\Input\VFRAC\MIXED
  type: float
  description: Vapor fraction
- name: component_flow
  aspen_path: \Data\Streams\{stream_name}\Input\FLOW\MIXED\{component}
  type: float
  description: Component flow rate
- name: output_temperature
  aspen_path: \Data\Streams\{stream_name}\Output\TEMP_OUT\MIXED
  type: float
  description: Output stream temperature
- name: output_component_flow
  aspen_path: \Data\Streams\{stream_name}\Output\MOLEFLOW\MIXED\{component}
  type: float
  description: Output component mole flow rate
